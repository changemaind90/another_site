<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/footer.css">

    <!-- ШРИФТЫ С ГУГЛА -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="header_inner">

            <div class="header_logo">
                <img class="logo" src="img/logo.svg" alt="Логотип сайта">
                <div class="logo_text"><span>Skin</span>Cash</div>
            </div>

            <nav class="header_menu">

                <ul class="menu_list">
                    <li class="menu_item">
                        <a class="link" href="#">
                            Помощь
                        </a>
                    </li>
                    <li class="menu_item">
                        <a class="link" href="#">
                            Контакты
                        </a>
                    </li>
                </ul>

            </nav>

            <div class="header_left">
                <div class="custom-select" id="language-selector">
                    <div class="selected-option">
                        <img src="https://flagcdn.com/ru.svg" alt="RU" />
                        RU
                    </div>
                    <div class="options">
                        <div class="option" data-lang="RU">
                            <img src="https://flagcdn.com/ru.svg" alt="RU" /> RU
                        </div>
                        <div class="option" data-lang="EN">
                            <img src="https://flagcdn.com/gb.svg" alt="EN" /> EN
                        </div>
                    </div>
                    <svg>
                    </svg>
                </div>
                <button class="header_btn">
                    Войти
                </button>
            </div>
        </div>
    </header>

    <main>

        <section>
            <h1 class="main_title">
                Принимайте платежи<br> от пользователей<br> с помощью скинов CS:GO и DOTA 2
            </h1>

            <button class="main_btn">
                Подключить проект
            </button>
        </section>

    </main>

    <footer class="footer">
        <div class="footer_copyright">Copyright © Skincash.ru</div>
        <ul class="footer_list">
            <li class="list_item">
                <a href="#">Помощь</a>
            </li>
            <li class="list_item">
                <a href="#">Контакты</a>
            </li>
            <li class="list_item">
                <a href="#">Пользовательское соглашение</a>
            </li>
        </ul>

    </footer>
</body>

</html>
